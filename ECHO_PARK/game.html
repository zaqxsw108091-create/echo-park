  showClear(stars,elapsed,target,sid){
    const cx=GW/2,cy=GH/2;
    // Dim + panel
    this.add.rectangle(0,0,GW,GH,0,0.7).setOrigin(0).setDepth(60);
    const panel=this.add.graphics().setDepth(61);
    panel.fillStyle(C.bg2,1); panel.fillRoundedRect(cx-230,cy-160,460,360,16);
    panel.lineStyle(2.5,C.teal,1); panel.strokeRoundedRect(cx-230,cy-160,460,360,16);
    // 별 상태별 헤더 컬러
    const hdrCol=stars===3?C.amber:C.teal;
    panel.fillStyle(hdrCol,0.15); panel.fillRoundedRect(cx-230,cy-160,460,44,{tl:16,tr:16,bl:0,br:0});

    // 제목
    const titleTxt=stars===3?'퍼펙트 클리어!! 🌟':stars===2?'스테이지 클리어! 🎉':'클리어 완료! ✅';
    this.add.text(cx,cy-138,titleTxt,{fontSize:'26px',fontFamily:"'Nunito',sans-serif",color:H(hdrCol),fontStyle:'bold'}).setOrigin(0.5).setDepth(62);

    // 별점
    this.add.text(cx,cy-88,[1,2,3].map(i=>i<=stars?'★':'☆').join('  '),{fontSize:'44px',fontFamily:'monospace',color:H(C.amber)}).setOrigin(0.5).setDepth(62);

    // 시간 정보
    const timeRatio=Math.floor((elapsed/target)*100);
    this.add.text(cx,cy-34,`${Math.floor(elapsed)}초  /  목표 ${target}초  (${timeRatio}%)`,{fontSize:'13px',fontFamily:'monospace',color:H(C.gray)}).setOrigin(0.5).setDepth(62);

    // 우정 포인트 + NPC 아바타들
    const fp=50+stars*20;
    this.add.text(cx,cy-4,`우정 포인트 +${fp}`,{fontSize:'11px',fontFamily:'monospace',color:H(C.purple2)}).setOrigin(0.5).setDepth(62);

    // NPC 아바타 행
    const npcs=this.G.npcs||[];
    if(npcs.length>0){
      const spacing=56;
      const startX=cx-(npcs.length-1)*spacing/2;
      npcs.forEach((npc,i)=>{
        const ax=startX+i*spacing, ay=cy+30;
        const def=NDEFS[npc.id];
        const ag=this.add.graphics().setDepth(62);
        ag.fillStyle(def.color,1); ag.fillCircle(ax,ay,18);
        ag.fillStyle(C.bg,0.5); ag.fillCircle(ax,ay,18);
        ag.fillStyle(def.color,1); ag.fillCircle(ax,ay,14);
        this.add.text(ax,ay,def.name.slice(0,1),{fontSize:'12px',fontFamily:"'Nunito',sans-serif",color:H(C.bg),fontStyle:'bold'}).setOrigin(0.5).setDepth(63);
        // 레벨 뱃지
        const lv=this.G.sv.friendshipLv[npc.id]||0;
        this.add.text(ax,ay+24,'Lv.'+lv,{fontSize:'8px',fontFamily:'monospace',color:H(def.color)}).setOrigin(0.5).setDepth(62);
      });
    }

    // 버튼들
    const[w,s]=sid.split('-').map(Number);
    const nk=`${w}-${s+1}`;
    const hasN=!!STAGES[nk];
    const mk=(x,y,txt,bg,col,cb)=>{
      const b=this.add.text(x,y,txt,{fontSize:'15px',fontFamily:"'Nunito',sans-serif",color:H(col),backgroundColor:H(bg),padding:{x:22,y:11},fontStyle:'bold'}).setOrigin(0.5).setDepth(62).setInteractive({cursor:'pointer'});
      b.on('pointerover',()=>b.setScale(1.05));b.on('pointerout',()=>b.setScale(1));
      b.on('pointerup',()=>cb());return b;
    };
    mk(cx+(hasN?70:0),cy+130,hasN?'다음 스테이지 →':'🏠  메뉴로',C.teal,0x0a2218,()=>{
      this.scene.stop('HUD');this.scene.stop('Game');
      hasN?this.scene.start('Game',{sid:nk}):this.scene.start('Menu');
    });
    if(hasN){
      mk(cx-80,cy+130,'↺ 다시',C.bg3,C.gray,()=>{this.scene.stop('HUD');this.scene.stop('Game');this.scene.start('Game',{sid});});
      mk(cx-220,cy+130,'메뉴',C.bg2,C.dim,()=>{this.scene.stop('HUD');this.scene.stop('Game');this.scene.start('Menu');});
    }
    // NPC 반응 대사
    npcs.forEach((npc,i)=>this.time.delayedCall(500+i*700,()=>npc.say(rLine(npc.id,'c'))));
  }

  // ── NPC 대화 패널 ─────────────────────────────────────────
  // ── 채팅 시스템: NPC와 채팅처럼 대화 ─────────────────────
  // ── 실제 채팅 시스템: HTML input 오버레이 방식 ─────────────
  // ── 채팅 시스템 (Phaser 전용 — WebGL 안전) ────────────────
  // ── 채팅 시스템 (Container 없음 — z-order 버그 완전 제거) ──
  // ──────────────────────────────────────────────────────────
  //  채팅 시스템 v4 — dim 잔여 버그 완전 수정
  // ──────────────────────────────────────────────────────────
  // ══ 채팅 패널 v5 — 완전 재작성 (blocker 제거, depth 수정) ══
  showTalkPanel(npcs, onCmd){
    this._killTalk();
    if(!npcs||npcs.length===0)return;

    this._tkActive=true;
    this._tkObjs=[];
    this._tkMsgs=[];
    this._tkTimers=[];
    let selNpc=npcs[0];
    const chatLogs={};
    npcs.forEach(n=>{ chatLogs[n.id]=[{who:'npc',text:rLine(n.id,'s')}]; });

    const W=500, PH=520, px=(GW-W)/2, py=(GH-PH)/2;
    const CHAT_Y=py+88, CHAT_H=PH-218;
    const OPT_Y=CHAT_Y+CHAT_H+6;

    const add=(o)=>{ this._tkObjs.push(o); return o; };

    // ── dim: 패널 밖 클릭 시만 닫힘 (blocker 불필요) ───────
    const dim=add(this.add.rectangle(GW/2,GH/2,GW,GH,0x000000,0.60)
      .setDepth(90).setInteractive({cursor:'default'}));
    dim.on('pointerdown',(ptr)=>{
      const inside=(ptr.x>=px&&ptr.x<=px+W&&ptr.y>=py&&ptr.y<=py+PH);
      if(!inside&&this._tkActive){ if(this.G)this.G._closeTalk(); }
    });

    // ── 패널 배경 ─────────────────────────────────────────
    const pg=add(this.add.graphics().setDepth(91));
    const caBg=add(this.add.graphics().setDepth(91));

    const drawPg=()=>{
      const def=NDEFS[selNpc.id];
      pg.clear();
      pg.fillStyle(0x1a2440,1); pg.fillRoundedRect(px,py,W,PH,14);
      pg.lineStyle(2.5,def.color,1); pg.strokeRoundedRect(px,py,W,PH,14);
      pg.fillStyle(def.color,0.18); pg.fillRoundedRect(px,py,W,48,{tl:14,tr:14,bl:0,br:0});
      caBg.clear();
      caBg.fillStyle(0x060c14,0.95); caBg.fillRoundedRect(px+8,CHAT_Y-2,W-16,CHAT_H+4,7);
    };
    drawPg();

    // ── 헤더 ──────────────────────────────────────────────
    const hdr=add(this.add.text(px+W/2,py+22,'',{
      fontSize:'15px',fontFamily:"'Nunito',sans-serif",fontStyle:'bold'
    }).setOrigin(0.5).setDepth(93));
    const updHdr=()=>{ const d=NDEFS[selNpc.id]; hdr.setText('💬 '+d.name+' ('+d.type+')').setColor(H(d.color)); };
    updHdr();

    // ── 닫기 버튼 ─────────────────────────────────────────
    const xBg=add(this.add.graphics().setDepth(93));
    xBg.fillStyle(0x5a1a1a,1); xBg.fillCircle(px+W-22,py+22,18);
    const xBt=add(this.add.text(px+W-22,py+22,'✕',{
      fontSize:'20px',fontFamily:'monospace',color:'#ff8888',fontStyle:'bold'
    }).setOrigin(0.5).setDepth(95).setInteractive({cursor:'pointer'}));
    xBt.on('pointerover',()=>xBt.setColor('#ffcccc'));
    xBt.on('pointerout', ()=>xBt.setColor('#ff8888'));
    xBt.on('pointerup',  ()=>{ if(this.G)this.G._closeTalk(); });

    // ── NPC 탭 (depth 높게!) ──────────────────────────────
    const tw=Math.min(88,Math.floor((W-20)/npcs.length));
    const tabs=npcs.map((npc,i)=>{
      const def=NDEFS[npc.id], tx=px+10+i*tw, ty=py+52;
      const tbg=add(this.add.graphics().setDepth(92));
      const drawTab=(sel)=>{
        tbg.clear();
        tbg.fillStyle(sel?def.color:0x2a3555,sel?0.35:1);
        tbg.fillRoundedRect(tx,ty,tw-4,28,6);
        tbg.lineStyle(sel?2:0.5,sel?def.color:0x506080,1);
        tbg.strokeRoundedRect(tx,ty,tw-4,28,6);
      };
      drawTab(npc.id===selNpc.id);
      const tnm=add(this.add.text(tx+(tw-4)/2,ty+14,def.name,{
        fontSize:'11px',fontFamily:"'Nunito',sans-serif",color:H(def.color),fontStyle:'bold'
      }).setOrigin(0.5).setDepth(94));
      // ★ 핵심: zone에 depth 96 설정 (blocker보다 높아야 클릭 가능)
      const tz=add(this.add.zone(tx+(tw-4)/2,ty+14,tw-4,28)
        .setDepth(96).setInteractive({cursor:'pointer'}));
      tz.on('pointerover',()=>{ tbg.clear(); tbg.fillStyle(def.color,0.25); tbg.fillRoundedRect(tx,ty,tw-4,28,6); tbg.lineStyle(1.5,def.color,1); tbg.strokeRoundedRect(tx,ty,tw-4,28,6); });
      tz.on('pointerout', ()=>drawTab(npc.id===selNpc.id));
      tz.on('pointerup',  ()=>{
        selNpc=npc;
        tabs.forEach(t=>t.drawTab(t.npc.id===selNpc.id));
        drawPg(); updHdr(); renderMsgs(); SND.menuMove();
      });
      return{tbg,drawTab,tnm,tz,npc};
    });

    // ── 메시지 렌더 ───────────────────────────────────────
    const renderMsgs=()=>{
      if(!this._tkActive)return;
      this._tkMsgs.forEach(o=>{
        try{if(o.bg&&!o.bg.destroyed)o.bg.destroy();}catch{}
        try{if(o.t&&!o.t.destroyed)o.t.destroy();}catch{}
      });
      this._tkMsgs=[];
      const mw=W-40;
      (chatLogs[selNpc.id]||[]).slice(-6).forEach((m,i)=>{
        const isP=(m.who==='player'), y=CHAT_Y+i*44;
        const bg=this.add.graphics().setDepth(93);
        if(isP){
          bg.fillStyle(0x0d5440,0.95); bg.fillRoundedRect(px+W-22-mw,y,mw,36,8);
          bg.lineStyle(1,0x1ab585,0.7); bg.strokeRoundedRect(px+W-22-mw,y,mw,36,8);
        }else{
          bg.fillStyle(0x1e2d48,0.95); bg.fillRoundedRect(px+14,y,mw,36,8);
          bg.lineStyle(1,NDEFS[selNpc.id].color,0.5); bg.strokeRoundedRect(px+14,y,mw,36,8);
        }
        const t=this.add.text(
          isP?(px+W-26):(px+18), y+18, m.text,
          {fontSize:'12px',fontFamily:"'Nunito',sans-serif",color:'#f0faff',wordWrap:{width:mw-10}}
        ).setOrigin(isP?1:0,0.5).setDepth(94);
        this._tkMsgs.push({bg,t});
      });
    };

    // ── 선택지 버튼 6개 (depth 96!) ───────────────────────
    const opts=[
      {l:'🎯 버튼으로 가줘', c:'go_button', co:0x0d8060},
      {l:'🏃 나한테 와줘',   c:'come_here', co:0x0d5080},
      {l:'🧍 기다려줘',     c:'wait_here', co:0x806010},
      {l:'💪 파이팅!',      c:'cheer',     co:0x602090},
      {l:'😄 자유롭게',     c:'patrol',    co:0x205080},
      {l:'❓ 어떻게 해?',   c:'help',      co:0x804010},
    ];
    const OW=(W-20)/3-4, OH=34;
    opts.forEach((opt,i)=>{
      const col2=i%3, row2=Math.floor(i/3);
      const ox=px+10+col2*(OW+6), oy=OPT_Y+row2*40;
      const og=add(this.add.graphics().setDepth(92));
      const dO=(hv)=>{
        og.clear();
        og.fillStyle(opt.co,hv?0.55:0.25);
        og.fillRoundedRect(ox,oy,OW,OH,7);
        og.lineStyle(hv?2:1,opt.co,hv?1:0.7);
        og.strokeRoundedRect(ox,oy,OW,OH,7);
      };
      dO(false);
      const ot=add(this.add.text(ox+OW/2,oy+OH/2,opt.l,{
        fontSize:'10.5px',fontFamily:"'Nunito',sans-serif",color:'#ddefff'
      }).setOrigin(0.5).setDepth(94));
      // ★ 핵심: depth 96
      const oz=add(this.add.zone(ox+OW/2,oy+OH/2,OW,OH)
        .setDepth(96).setInteractive({cursor:'pointer'}));
      oz.on('pointerover',()=>dO(true));
      oz.on('pointerout', ()=>dO(false));
      oz.on('pointerup', ()=>{
        chatLogs[selNpc.id]=chatLogs[selNpc.id]||[];
        chatLogs[selNpc.id].push({who:'player',text:opt.l});
        renderMsgs(); SND.chatMsg();
        const tm=this.time.delayedCall(400+Math.random()*300,()=>{
          if(!this._tkActive)return;
          chatLogs[selNpc.id].push({who:'npc',text:this._npcReply(selNpc.id,opt.l)});
          renderMsgs(); SND.chatMsg();
          if(opt.c!=='help') onCmd(selNpc.id,opt.c);
        });
        this._tkTimers.push(tm);
      });
    });

    // ── 직접 입력 라벨 ────────────────────────────────────
    const inpY=OPT_Y+2*40+8;
    add(this.add.graphics().setDepth(92))
      .fillStyle(0x0a1220,1).fillRoundedRect(px+8,inpY-2,W-78,38,6);
    add(this.add.text(px+16,inpY+8,'💬 직접 입력:',{
      fontSize:'10px',fontFamily:'monospace',color:'#88aabb'
    }).setDepth(93));

    // ── 전송 버튼 ─────────────────────────────────────────
    const sbg=add(this.add.graphics().setDepth(92));
    sbg.fillStyle(0x0d4f3c,1); sbg.fillRoundedRect(px+W-64,inpY-2,54,38,6);
    const sbt=add(this.add.text(px+W-37,inpY+17,'→',{
      fontSize:'22px',fontFamily:'monospace',color:'#2de8b0',fontStyle:'bold'
    }).setOrigin(0.5).setDepth(95).setInteractive({cursor:'pointer'}));
    sbt.on('pointerover',()=>sbt.setColor('#ffffff'));
    sbt.on('pointerout', ()=>sbt.setColor('#2de8b0'));

    // ── DOM input (canvas 좌표 보정 + resize 대응) ───────────
    const cv=this.sys.game.canvas;
    const iEl=document.createElement('input');
    iEl.type='text'; iEl.placeholder='자유롭게 입력 후 Enter'; iEl.maxLength=60;
    iEl.className='echo-chat-in';
    iEl.style.cssText='position:fixed;z-index:9999;'+
      'background:#0a1a2a;color:#e8f8f0;border:1.5px solid #2de8b0;'+
      'border-radius:6px;padding:0 10px;outline:none;';
    document.body.appendChild(iEl);
    this._tkInputEl=iEl;

    // 위치/크기 갱신 함수 — 패널 열린 동안 resize에도 재계산
    const updateInputPos=()=>{
      if(!iEl.parentNode)return;
      const rc2=cv.getBoundingClientRect();
      const sx2=rc2.width/GW, sy2=rc2.height/GH;
      iEl.style.left=(rc2.left+(px+10)*sx2)+'px';
      iEl.style.top=(rc2.top+(inpY-2)*sy2)+'px';
      iEl.style.width=((W-78)*sx2)+'px';
      iEl.style.height=(38*sy2)+'px';
      iEl.style.fontSize=Math.max(11,12*Math.min(sx2,sy2))+'px';
    };
    updateInputPos();
    this._tkResizeFn=updateInputPos;
    window.addEventListener('resize',updateInputPos);

    const sendTxt=()=>{
      const txt=(iEl.value||'').trim(); if(!txt)return; iEl.value='';
      chatLogs[selNpc.id]=chatLogs[selNpc.id]||[];
      chatLogs[selNpc.id].push({who:'player',text:txt});
      renderMsgs(); SND.chatMsg();
      const tm=this.time.delayedCall(400+Math.random()*400,()=>{
        if(!this._tkActive)return;
        chatLogs[selNpc.id].push({who:'npc',text:this._npcReply(selNpc.id,txt)});
        renderMsgs(); SND.chatMsg();
        const cmd=this._cmdDetect(txt);
        if(cmd) onCmd(selNpc.id,cmd);
      });
      this._tkTimers.push(tm);
    };
    sbt.on('pointerup',()=>sendTxt());
    iEl.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();sendTxt();} });

    // ── T키 닫기 ──────────────────────────────────────────
    this._tkKeyFn=()=>{ if(this.G)this.G._closeTalk(); };
    this.input.keyboard.on('keydown-T',this._tkKeyFn);

    renderMsgs();
    setTimeout(()=>{ try{iEl.focus();}catch{} },120);
  }
  _npcReply(id,txt){
    const t=txt.toLowerCase();
    const R=(a)=>a[Math.floor(Math.random()*a.length)];
    // 캐릭터 인덱스
    const idx={luna:0,rico:1,moca:2,blaze:3,peach:4}[id]??0;
    const pick=(a)=>a[idx]??a[0];
    // 게임 상태 읽기
    const G=this.G;
    const btnCount=G?Object.keys(G.btnActive||{}).length:0;
    const pressedCount=G?Object.values(G.btnActive||{}).filter(Boolean).length:0;
    const allPressed=btnCount>0&&pressedCount===btnCount;

    // ── 게임 상태 연동 응답 ──
    if(t.includes('버튼')||t.includes('🎯')||t.includes('누를게')||t.includes('눌러줄게')){
      if(allPressed) return pick(['이미 다 눌렸어! 출구로 가!! 🚪💡','다 눌렸잖아!! 빨리 출구!','버튼 전부 활성화 완료. 출구 이동.','다 됐어!! 달려!! ⚡','다 눌렸어!! 출구로 가요! 💕']);
      const left=btnCount-pressedCount;
      return pick([`${left}개 남았어. 내가 갈게! 💡`,`${left}개 남았어!! 지금 달린다!! 💨`,`남은 버튼: ${left}개. 이동.`,`${left}개!! 빠르게!! ⚡`,`${left}개 남았어요. 같이 해요! 💕`]);
    }
    if(t.includes('출구')||t.includes('나가')||t.includes('클리어')){
      if(allPressed) return pick(['출구 열렸어!! 지금 가!! 🚪💡','달려!! 출구!! 💨','출구 활성화. 이동하세요.','GO GO GO!! ⚡','어서 출구로!! 💕🚪']);
      return pick(['아직 버튼을 다 안 눌렀어 💡','버튼 먼저!! 그다음 출구!!','버튼 전부 → 출구 해제 순서.','버튼부터 눌러야지!! ⚡','버튼이 다 눌려야 출구 열려요 🌸']);
    }
    if(t.includes('에코')||t.includes('녹화')||t.includes('[e]')){
      return pick(['[E] 누르면 녹화 시작! 버튼 위 서 있다가 다시 [E] → 루프 재생돼 💡','에코로 버튼 여러 개 동시에 가능! 빠르게 해봐!!','에코: 행동을 녹화→재생. 3개까지 사용 가능.','에코 배치하고 나 따라와!! ⚡','[E]로 녹화, [E]로 정지예요! 같이 해봐요 🌸']);
    }
    if(t.includes('어떻게')||t.includes('❓')||t.includes('모르겠')||t.includes('힌트')||t.includes('도움')){
      return pick(['버튼을 전부 동시에 눌러야 해! 에코([E])로 분신을 만들면 혼자도 가능해 💡','일단 에코 써봐! [E]로 녹화하고 버튼 위에 서있어. 그다음 [E] 정지. 루프됨!','전략: 에코 3개 배치 → 각 버튼 커버 → 동시 활성화.','그냥 빨리 달리면서 에코 써봐!! ⚡','천천히 해봐요. [E]키로 에코 쓰면 돼요! 🌸']);
    }
    if(t.includes('안녕')||t.includes('하이')||t==='hi'||t.includes('처음')){
      return pick(['안녕! 난 루나야 😊 막히면 언제든 물어봐!','야 왔어? 같이 빠르게 클리어하자!!','안녕. 나는 모카. 데이터 분석 전문.','블레이즈!! 빠른 클리어가 목표야 ⚡','안녕하세요~ 피치예요! 잘 부탁해요 💕']);
    }
    if(t.includes('이름')||t.includes('누구')||t.includes('소개')){
      return pick(['루나야! 가이드형. 막히면 힌트, 전략 조언이 특기 💡','리코!! 돌격형. 빠른 행동, 빠른 클리어. 생각보다 실행 먼저!!','모카. 분석형. 에러율 2%, 타이밍 정확도 98%. 믿어도 됨.','블레이즈!! 스피드형. 이 팀 최속!! 나 따라오면 됨 ⚡','피치예요! 서포터형. 팀원 응원과 협력이 전문이에요 💕']);
    }
    if(t.includes('뭐해')||t.includes('잘지내')||t.includes('어때')){
      const stateMsg=allPressed?'버튼 다 눌렸어! 출구 가야해':'버튼 '+pressedCount+'/'+btnCount+' 눌림. 열심히 중.';
      return pick([`${stateMsg}! 😊`,'게임 중이잖아!! 집중해!! 🔥',`현재 상태: ${stateMsg}.`,`${stateMsg}!! ⚡`,`${stateMsg}~ 같이 하고 있어요! 💕`]);
    }
    if(t.includes('와줘')||t.includes('와 줘')||t.includes('🏃')||t.includes('여기')){
      return pick(['지금 바로 갈게! 😊','오케이!! 100% 최고속도로 간다!!','이동 경로 최적화 중. 접근.','이미 달리는 중!! ⚡','금방 갈게요! 기다려 주세요 💕']);
    }
    if(t.includes('기다려')||t.includes('🧍')||t.includes('잠깐')){
      return pick(['알겠어! 여기 있을게 😊','에이~ 심심한데... 알겠어 😅','대기 모드.','기다리는 건 싫은데... 알겠어','네! 여기 있을게요 💕']);
    }
    if(t.includes('자유롭게')||t.includes('😄')||t.includes('돌아다녀')){
      return pick(['알겠어~ 자유롭게 탐색할게! 😊','오케이!! 이리저리 달려볼게 🔥','순찰 모드 활성화.','달려야 제맛!! ⚡','산책하면서 기다릴게요 🌸']);
    }
    if(t.includes('파이팅')||t.includes('💪')||t.includes('힘내')||t.includes('할수있어')){
      return pick(['너라면 할 수 있어!! 우리 팀 최고야 💪😊','무조건 해낸다!! 100% 확신!! 🔥','성공 확률: 높음. 집중만 하면 됨.','GO GO GO!! 지금 당장!! ⚡','파이팅!! 항상 응원할게요!! 💕✨']);
    }
    if(t.includes('고마워')||t.includes('감사')||t.includes('좋아')||t.includes('최고')){
      return pick(['같이 한 거지~ 😊 다음에도 도와줄게!','나 없었으면 어쩔 뻔 ㅋ 당연하지!!','고마움 수신. 도움이 됐다니 다행.','당연하지!! 나 원래 이 정도야 ⚡','정말?? 너도 너무 잘했어!! 💕']);
    }
    if(t.includes('미안')||t.includes('잘못')||t.includes('실수')){
      return pick(['괜찮아! 같이 다시 하면 돼 😊','에이~ 실수야 실수! 다시 하자!!','실수 = 학습. 다음엔 안 그럼.','괜찮아 빨리 다시 하면 됨!!','괜찮아요! 다시 같이 해봐요 🌸']);
    }
    if(t.includes('재밌어')||t.includes('신나')||t.includes('좋은데')){
      return pick(['맞아! 에코 파크 중독성 있지 😊','재밌지?! 더 빠르게 클리어해보자!!','게임 만족도 지수: 상승.','재밌어?! 나랑 경쟁해볼래!! ⚡','나도 너랑 있어서 너무 좋아!! 💕']);
    }
    if(t.includes('어려워')||t.includes('못하겠')||t.includes('힘들어')||t.includes('포기')){
      return pick(['포기하면 안 돼! 에코 먼저 써봐 — 분명 할 수 있어 💡','어려워? 그럼 더 빨리 해야지!! 🔥','현재 클리어 가능 루트 존재. 포기 불필요.','포기?! 그건 없어!! GO!! ⚡','포기 안 돼요! 같이 천천히 해봐요 🌸']);
    }
    if(t.includes('루나')||t.includes('리코')||t.includes('모카')||t.includes('블레이즈')||t.includes('피치')){
      const npcComments={
        luna:['루나는 팀의 두뇌야! 전략 담당 💡','루나? 좋은 친구지 뭐~','루나: 가이드형. 힌트 최다 보유.','루나는 너무 느려 ㅋ 그래도 전략은 최고!!','루나 언니 최고예요!! 💕'],
        rico:['리코는 항상 최선을 다해! 믿어도 돼 😊','나야나!! 최고잖아!!','리코: 고속, 고오류. 보정 필요.','리코는 나랑 잘 맞아!! ⚡','리코 오빠 에너지 넘쳐요!! 🔥'],
        moca:['모카는 타이밍이 정말 정확해! 믿어봐 💡','모카? 느리지만 정확하긴 해','모카: 분석형. 협력 최적.','모카는 계산만 해!! 나처럼 그냥 달려!! ⚡','모카 언니 차분해서 좋아요 🌸'],
        blaze:['블레이즈는 속도 하나만큼은 진짜야 😊','나 말하는 거야?!! 당연하지!!','블레이즈: 최고속도, 높은 오류율.','내가 제일 빠른 건 사실이야!!','블레이즈 오빠 무서워요(좋은 의미로) 💕'],
        peach:['피치는 항상 긍정적이야! 팀 분위기 메이커 😊','피치? 응원은 최고야!!','피치: 서포터형. 팀 사기 상승 효과.','피치는 항상 응원해줘서 좋아!! 💪','우리 피치 최고예요!!! 💕'],
      };
      const mentioned=Object.keys(npcComments).find(n=>t.includes(n));
      if(mentioned&&npcComments[mentioned]) return pick(npcComments[mentioned]);
    }
    // 기본 응답 (게임 상태 반영)
    const progress=btnCount>0?` (현재 ${pressedCount}/${btnCount} 버튼)`:' ';
    const defs={
      luna:[`같이 하면 돼!${progress} 에코 잘 활용해봐 💡`,`전략적으로 생각해봐${progress} 😊`,'버튼 위치 파악이 먼저야!'],
      rico:[`빨리 달리면 됨!!${progress}!! 🔥`,'GO!! 생각보다 간단해!!','지금 당장 해!!'],
      moca:[`데이터 분석 중${progress}.`,'최적 루트 계산 완료.','전략적 접근 권장.'],
      blaze:[`빠르게!!${progress} ⚡`,'지금 달려!!','속도가 전부야!!'],
      peach:[`같이 할 수 있어!${progress} 💕`,'포기하지 마요! 🌸','항상 응원할게요!'],
    };
    return R(defs[id]||defs.luna);
  }

  // 텍스트 명령 감지
  _cmdDetect(txt){
    const t=txt.toLowerCase();
    if(t.includes('버튼으로')||(t.includes('버튼')&&t.includes('가줘'))) return 'go_button';
    if(t.includes('와줘')||t.includes('이리와')||t.includes('나한테와')) return 'come_here';
    if(t.includes('기다려')||t.includes('잠깐있어')) return 'wait_here';
    if(t.includes('자유롭게')||t.includes('마음대로')) return 'patrol';
    if(t.includes('힘내라고')||t.includes('응원해줘')) return 'cheer';
    return null;
  }

  // ── 완전 정리 ────────────────────────────────────────────
  _killTalk(){
    this._tkActive=false;
    // delayedCall 취소
    if(this._tkTimers){ this._tkTimers.forEach(t=>{try{t.remove(false);}catch{}}); this._tkTimers=[]; }
    // 메시지 오브젝트 정리
    if(this._tkMsgs){ this._tkMsgs.forEach(o=>{try{if(!o.bg.destroyed)o.bg.destroy();}catch{} try{if(!o.t.destroyed)o.t.destroy();}catch{}}); this._tkMsgs=[]; }
    // Phaser 오브젝트 전부 정리
    if(this._tkObjs){ this._tkObjs.forEach(o=>{try{if(o&&!o.destroyed)o.destroy();}catch{}}); this._tkObjs=[]; }
    // T키 핸들러 해제
    if(this._tkKeyFn){ try{this.input.keyboard.off('keydown-T',this._tkKeyFn);}catch{} this._tkKeyFn=null; }
    // resize 리스너 해제
    if(this._tkResizeFn){ window.removeEventListener('resize',this._tkResizeFn); this._tkResizeFn=null; }
    // DOM input 제거
    if(this._tkInputEl){ try{document.body.removeChild(this._tkInputEl);}catch{} this._tkInputEl=null; }
    // 혹시 남은 DOM input 제거
    document.querySelectorAll('.echo-chat-in').forEach(el=>{ try{document.body.removeChild(el);}catch{}});
  }

  hideTalkPanel(){ this._killTalk(); }
}
